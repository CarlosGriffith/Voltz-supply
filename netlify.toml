# Full checklist: NETLIFY.md — static SPA only; API on Render (RENDER.md).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = ".env.example,NETLIFY.md,scripts,server/db.mjs"

# Optional CSP: add in Netlify UI only if needed.

# SPA (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
