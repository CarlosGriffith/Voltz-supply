# Full checklist: NETLIFY.md
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Aiven host/port/user/database appear in docs and db tooling; Netlify compares secret env
  # values to the whole repo and fails the build on matches. Omit those paths from scanning.
  # See https://docs.netlify.com/manage/security/secret-scanning/
  SECRETS_SCAN_OMIT_PATHS = ".env.example,NETLIFY.md,scripts,server/db.mjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["scripts/aiven-ca.pem"]
  external_node_modules = [
    "express",
    "mysql2",
    "nodemailer",
    "multer",
    "serverless-http",
    "@netlify/blobs",
  ]

# Allow fetch() from the marketing domain to the Netlify API host (VITE_API_URL / voltz-api-fallback-origin).
# Without connect-src including *.netlify.app, browsers report "Failed to fetch" (CSP), not a JSON error.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https: data:; connect-src 'self' https://voltz-supply.netlify.app https://*.netlify.app https: wss: data: blob:; frame-ancestors 'self'; base-uri 'self'"

# Express on Netlify: official /api rewrite + uploads proxied to the same function.
# If /uploads/* 404s in production, check function logs; some accounts preserve the
# original path on rewrite to `/.netlify/functions/api`.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA (React Router): after API/upload rules above
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
