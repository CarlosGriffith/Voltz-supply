# ============================================================
# Nginx Configuration for voltzsupply.com
# ============================================================
#
# SETUP INSTRUCTIONS:
#   1. Copy this file to Nginx sites directory:
#      sudo cp voltzsupply.conf /etc/nginx/conf.d/voltzsupply.conf
#
#   2. Remove the default config (if it conflicts):
#      sudo rm /etc/nginx/conf.d/default.conf
#
#   3. Test configuration:
#      sudo nginx -t
#
#   4. Reload Nginx:
#      sudo systemctl reload nginx
#
#   5. Then run Certbot to add SSL (see deploy-ec2.sh)
#
# ============================================================

# --- HTTP → HTTPS redirect (Certbot will auto-configure this) ---
server {
    listen 80;
    listen [::]:80;
    server_name voltzsupply.com www.voltzsupply.com;

    # Allow Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all HTTP to HTTPS (uncomment AFTER Certbot runs)
    # return 301 https://$host$request_uri;

    # --- Temporary: serve site on HTTP until SSL is configured ---
    root /var/www/voltzsupply;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

